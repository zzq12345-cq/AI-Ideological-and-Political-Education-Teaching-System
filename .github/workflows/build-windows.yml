name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (optional, supports vX.Y.Z)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"
          if (-not [string]::IsNullOrWhiteSpace($inputVersion)) {
            $version = $inputVersion
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $match = Select-String -Path CMakeLists.txt -Pattern 'project\(AILoginSystem VERSION ([0-9]+\.[0-9]+\.[0-9]+)'
            if (-not $match) {
              throw 'Failed to resolve version from CMakeLists.txt'
            }
            $version = $match.Matches[0].Groups[1].Value
          }

          if ($version.StartsWith('v')) {
            $version = $version.Substring(1)
          }

          "display_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.2'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          archives: 'qtbase qtsvg qtdeclarative qtshadertools'
          modules: 'qtcharts'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package Windows release
        shell: pwsh
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          TIANXING_API_KEY: ${{ secrets.TIANXING_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_BASE_URL: ${{ secrets.ZHIPU_BASE_URL }}
        run: |
          $qtBinDir = Join-Path $env:QT_ROOT_DIR "bin"
          ./scripts/package_windows.ps1 -Version "${{ steps.version.outputs.display_version }}" -BuildDir build -OutputDir build -QtBinDir $qtBinDir -EmbedReleaseKeys

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI思政智慧课堂-Windows-${{ steps.version.outputs.display_version }}
          path: |
            build/AI思政智慧课堂-Windows-x64-${{ steps.version.outputs.display_version }}.zip
            build/AI思政智慧课堂-Setup-Windows-x64-${{ steps.version.outputs.display_version }}.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/AI思政智慧课堂-Windows-x64-${{ steps.version.outputs.display_version }}.zip
            build/AI思政智慧课堂-Setup-Windows-x64-${{ steps.version.outputs.display_version }}.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
